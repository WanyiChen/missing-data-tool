services:
  - type: web
    name: missing-data-tool-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && python run.py"
    envVars:
      - key: PORT
        value: 10000

  - type: web
    name: missing-data-tool-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run preview -- --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: 10000